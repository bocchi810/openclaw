name: Android CI

on:
  workflow_dispatch: 

permissions:
  contents: write # 必须授予写入权限以创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    # 设置默认的工作目录，这样后续所有指令都会在 apps/android 下执行
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Set up JDK 25
        uses: actions/setup-java@main
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assemblePlayDebug
      - name: Upload APK
        uses: actions/upload-artifact@main
        with:
          name: app-release-apk
          # 这里指向构建出的 APK 文件路径
          path: apps/android/app/build/outputs/apk/play/debug
